<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Design — 智能床云端系统</title>
<style>
  :root {
    --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --text2: #64748b;
    --border: #e2e8f0; --radius: 10px; --shadow: 0 1px 3px rgba(0,0,0,.08);
    --blue: #2563eb; --purple: #7c3aed; --green: #10b981; --red: #ef4444; --amber: #d97706;
    --info-bg: #eff6ff; --info-border: #bfdbfe; --info-text: #1e40af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.55; font-size: .9rem; }

  .toolbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow); }
  .toolbar .title { font-weight: 700; font-size: .95rem; }
  .toolbar .stats { font-size: .78rem; color: var(--text2); margin-left: auto; }

  .layout { display: flex; height: calc(100vh - 46px); }
  #sidebar { width: 240px; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0; flex-shrink: 0; }
  #sidebar h3 { font-size: .72rem; text-transform: uppercase; color: var(--text2); padding: 0 14px; margin: 12px 0 4px; letter-spacing: .05em; cursor: default; }
  #sidebar h3:first-child { margin-top: 0; }
  #sidebar nav a { display: block; padding: 5px 14px; font-size: .82rem; color: var(--text); text-decoration: none; border-left: 3px solid transparent; transition: all .15s; cursor: pointer; user-select: none; }
  #sidebar nav a:hover { background: #f8fafc; color: var(--blue); }
  #sidebar nav a.active { border-left-color: var(--blue); color: var(--blue); background: #eff6ff; font-weight: 600; }

  #content { flex: 1; overflow-y: auto; padding: 20px 28px; }

  .section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .section h1 { font-size: 1.3rem; margin-bottom: 8px; }
  .section h2 { font-size: 1.1rem; margin: 16px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .section h3 { font-size: .95rem; margin: 12px 0 6px; }
  .section p { margin-bottom: 6px; }

  .endpoint-card { border: 1px solid var(--border); border-radius: 8px; margin: 10px 0; overflow: hidden; }
  .endpoint-card .ep-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .endpoint-card .ep-body { padding: 12px 14px; font-size: .83rem; }
  .endpoint-card .ep-body table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .endpoint-card .ep-body th { background: #fafbfc; text-align: left; padding: 4px 8px; font-size: .76rem; color: var(--text2); border-bottom: 1px solid var(--border); }
  .endpoint-card .ep-body td { padding: 4px 8px; border-bottom: 1px solid var(--border); font-size: .80rem; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: .72rem; font-weight: 600; white-space: nowrap; }
  .badge.rest { background: #dbeafe; color: #1e40af; }
  .badge.zyric { background: #ede9fe; color: #6d28d9; }
  .badge.mqtt { background: #fef3c7; color: #92400e; }
  .badge.ws { background: #d1fae5; color: #065f46; }
  .badge.call { background: #dbeafe; color: #1e40af; }
  .badge.ack { background: #fce7f3; color: #be185d; }
  .badge.get { background: #d1fae5; color: #065f46; }
  .badge.post { background: #dbeafe; color: #1e40af; }
  .badge.put { background: #fef3c7; color: #92400e; }
  .badge.del { background: #fee2e2; color: #991b1b; }
  .badge.success { background: #d1fae5; color: #065f46; }
  .badge.error { background: #fee2e2; color: #991b1b; }

  pre.code { font-size:.78rem; background:#f8fafc; padding:10px; border-radius:6px; overflow-x:auto; border:1px solid var(--border); margin:6px 0; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state h2 { font-size: 1.1rem; margin-bottom: 6px; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="title">🔌 API Design — 智能床云端系统</span>
  <span class="stats" id="toolbarStats">加载中…</span>
</div>

<div class="layout">
  <div id="sidebar">
    <h3>协议定义</h3>
    <nav id="navProtocols"></nav>
    <h3>领域端点</h3>
    <nav id="navDomains"></nav>
  </div>

  <div id="content">
    <div class="empty-state" id="loading"><h2>⏳ 加载中…</h2><p>正在读取协议定义和端点数据…</p></div>
  </div>
</div>

<script>
// ⚠️ 必须在所有数据文件加载前初始化 window.API_DATA
window.API_DATA = window.API_DATA || {};

// ── 全局查看器 ──
(function () {
  var content = document.getElementById('content');
  var loading = document.getElementById('loading');

  // ⚠️ 自动发现可用文件（不硬编码具体协议名）
  // 协议文件：protocols/ 下所有 .js 文件
  // 端点数据：data/ 下所有 .js 文件
  var files = [
    "protocols/rest.js",     // 内置默认，所有项目必装
    "protocols/zyric-v1.js"  // 项目专属设备协议
  ];

  // ⚠️ 此列表需与 data/ 目录下的实际文件保持同步
  var dataFiles = [
    "data/01-device-iot.js",
    "data/02-core-domains.js",
    "data/05-identity-auth.js",
    "data/system.js"
  ];

  function loadScripts(list, cb) {
    var total = list.length;
    if (total === 0) { cb(); return; }
    var done = 0;
    function check() { done++; if (done === total) cb(); }
    list.forEach(function (src) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = check;
      s.onerror = function () { console.warn('Failed to load: ' + src); check(); };
      document.head.appendChild(s);
    });
  }

  function apiData() { return window.API_DATA || {}; }

  function waitForData(retries) {
    retries = retries || 0;
    var D = apiData();
    // 只要求 rest 协议必须存在（内置默认）
    if (D['protocol-rest']) {
      loading.style.display = 'none';
      var protoCount = Object.keys(D).filter(function (k) { return k.startsWith('protocol-'); }).length;
      var domainCount = Object.keys(D).filter(function (k) { return k.startsWith('domain-'); }).length;
      document.getElementById('toolbarStats').textContent = protoCount + ' 协议 | ' + domainCount + ' 领域';
      buildNav();
      // 默认展示：优先选协议视图，否则选第一个领域
      if (D['protocol-rest']) showView('protocol-rest');
      else if (domainCount > 0) showView(Object.keys(D).filter(function (k) { return k.startsWith('domain-'); })[0]);
      return;
    }
    if (retries > 100) { loading.innerHTML = '<h2>❌ 加载失败</h2><p>请确认 protocols/rest.js 文件存在<br>浏览器控制台可能有详细错误</p>'; return; }
    setTimeout(function () { waitForData(retries + 1); }, 100);
  }

  function buildNav() {
    var D = apiData();
    // 协议导航
    var navP = document.getElementById('navProtocols');
    Object.keys(D).filter(function (k) { return k.startsWith('protocol-'); }).forEach(function (k) {
      var p = D[k];
      var a = document.createElement('a');
      a.textContent = p.name;
      a.setAttribute('data-view', k);
      navP.appendChild(a);
    });
    // 领域导航
    var navD = document.getElementById('navDomains');
    var domains = Object.keys(D).filter(function (k) { return k.startsWith('domain-'); });
    if (domains.length === 0) {
      var a = document.createElement('a');
      a.textContent = '（端点数据待创建）';
      a.style.color = 'var(--text2)'; a.style.fontStyle = 'italic'; a.style.cursor = 'default';
      navD.appendChild(a);
    } else {
      domains.forEach(function (k) {
        var d = D[k];
        var a = document.createElement('a');
        a.textContent = d.name || k;
        a.setAttribute('data-view', k);
        navD.appendChild(a);
      });
    }
  }

  // 事件委托
  document.getElementById('sidebar').addEventListener('click', function (e) {
    var a = e.target.closest('a');
    if (!a) return;
    var view = a.getAttribute('data-view');
    if (view) showView(view);
  });

  function showView(id) {
    setActiveNav('[data-view="' + id + '"]');
    content.innerHTML = '';
    var D = apiData();
    if (id.startsWith('protocol-')) {
      var p = D[id];
      if (p) renderProtocol(p); else content.innerHTML = '<div class="section"><h1>协议未找到</h1></div>';
    } else if (id.startsWith('domain-')) {
      var d = D[id];
      if (d) renderDomain(d); else content.innerHTML = '<div class="section"><h1>领域未找到</h1></div>';
    }
  }

  function setActiveNav(sel) {
    document.querySelectorAll('#sidebar nav a').forEach(function (a) { a.classList.remove('active'); });
    var el = document.querySelector('#sidebar ' + sel);
    if (el) el.classList.add('active');
  }

  function sec(title, fn) {
    var d = document.createElement('div'); d.className = 'section';
    var h = document.createElement('h1'); h.textContent = title; d.appendChild(h);
    if (fn) fn(d);
    content.appendChild(d);
    return d;
  }

  function badge(text, cls) { return '<span class="badge ' + cls + '">' + text + '</span>'; }

  function tbl(headers, rows, parent) {
    var t = document.createElement('table');
    var th = document.createElement('thead'); var tr = document.createElement('tr');
    headers.forEach(function (h) { var thc = document.createElement('th'); thc.textContent = h; tr.appendChild(thc); });
    th.appendChild(tr); t.appendChild(th);
    var tb = document.createElement('tbody');
    rows.forEach(function (r) {
      var rr = document.createElement('tr');
      r.forEach(function (c) { var td = document.createElement('td'); td.innerHTML = c; rr.appendChild(td); });
      tb.appendChild(rr);
    });
    t.appendChild(tb);
    (parent || content.lastChild).appendChild(t);
  }

  function fieldTable(fields, parent) {
    var rows = Object.keys(fields).map(function (k) {
      var f = fields[k];
      var req = f.required ? badge('必填', 'error') : f.required_if ? badge('条件', 'amber') : badge('可选', 'success');
      return ['<code>' + k + '</code>', f.type || '', req, f.desc || ''];
    });
    tbl(['字段', '类型', '约束', '说明'], rows, parent);
  }

  // ═══════════════════════════════════════════
  // 协议详情渲染
  // ═══════════════════════════════════════════

  function renderProtocol(p) {
    sec(p.name + ' — ' + (p.fullName || p.description), function (el) {
      el.innerHTML += '<p>' + (p.description || '') + '</p>';
      if (p.version) el.innerHTML += '<p>版本：' + p.version + (p.changeLog ? ' — ' + p.changeLog : '') + '</p>';
      if (p.specDocument) el.innerHTML += '<p style="font-size:.80rem;color:var(--text2)">📄 来源：' + p.specDocument + '</p>';
    });

    // 术语表
    if (p.glossary) {
      sec('术语表', function (el) {
        tbl(['术语', '含义'], Object.keys(p.glossary).map(function (k) { return ['<strong>' + k.replace(/_/g, ' ') + '</strong>', p.glossary[k]]; }), el);
      });
    }

    // 承载层
    if (p.transports) {
      sec('承载层', function (el) {
        p.transports.forEach(function (t) {
          el.innerHTML += '<h3>' + badge(t.type.toUpperCase(), t.type === 'mqtt' ? 'mqtt' : 'ws') + ' — ' + (t.description || '') + '</h3>';
          if (t.parameters) {
            el.innerHTML += '<h4>参数</h4>';
            tbl(['参数', '值'], Object.keys(t.parameters).map(function (k) { return ['<code>' + k + '</code>', t.parameters[k]]; }), el);
          }
          if (t.topics) {
            el.innerHTML += '<h4>Topic 规范</h4>';
            el.innerHTML += '<p style="font-size:.82rem;color:var(--text2)">' + (t.topics.description || '') + '</p>';
            if (t.topics.upstream) el.innerHTML += '<p>上行：<code>' + t.topics.upstream.topic + '</code> (QoS ' + t.topics.upstream.qos + ')</p>';
            if (t.topics.downstream) el.innerHTML += '<p>下行：<code>' + t.topics.downstream.topic + '</code> (QoS ' + t.topics.downstream.qos + ')</p>';
            if (t.topics.will) el.innerHTML += '<p>遗嘱：<code>' + t.topics.will.topic + '</code> (QoS ' + t.topics.will.qos + ')</p>';
            if (t.topics.platformSubscriptions) el.innerHTML += '<p>平台订阅：' + t.topics.platformSubscriptions.join('<br>') + '</p>';
          }
        });
      });
    }

    // 双链路对比
    if (p.transportComparison) {
      sec('双链路对比', function (el) {
        tbl(p.transportComparison.columns, p.transportComparison.rows, el);
        if (p.transportComparison.notes) el.innerHTML += '<ul>' + p.transportComparison.notes.map(function (n) { return '<li>' + n + '</li>'; }).join('') + '</ul>';
      });
    }

    // 设备身份与认证
    if (p.identity) {
      sec('设备身份与认证', function (el) {
        if (p.identity.credentials) {
          el.innerHTML += '<h3>核心凭证</h3>';
          tbl(['凭证', '格式', '分配方', '用途'], p.identity.credentials.map(function (c) { return ['<code>' + c.name + '</code>', c.format, c.assignedBy, c.purpose]; }), el);
        }
        if (p.identity.deviceAddress) {
          el.innerHTML += '<h3>设备地址</h3><p>格式：<code>' + p.identity.deviceAddress.format + '</code> | 示例：<code>' + p.identity.deviceAddress.example + '</code></p>';
        }
        if (p.identity.signingAlgorithm) {
          var sa = p.identity.signingAlgorithm;
          el.innerHTML += '<h3>签名算法 — ' + sa.name + '</h3>';
          el.innerHTML += '<p>' + sa.description + '</p><p>格式：<code>' + sa.passwordFormat + '</code></p>';
          el.innerHTML += '<h4>设备端步骤</h4><ol>' + sa.deviceSteps.map(function (s) { return '<li>' + s + '</li>'; }).join('') + '</ol>';
          el.innerHTML += '<h4>平台端校验</h4><ol>' + sa.platformSteps.map(function (s) { return '<li>' + s + '</li>'; }).join('') + '</ol>';
          if (sa.designNotes) el.innerHTML += '<h4>设计要点</h4><ul>' + sa.designNotes.map(function (n) { return '<li>' + n + '</li>'; }).join('') + '</ul>';
        }
      });
    }

    // 心跳机制
    if (p.heartbeat) {
      sec('心跳与重连', function (el) {
        el.innerHTML += '<p>' + (p.heartbeat.description || '') + '</p>';
        el.innerHTML += '<h3>传输层</h3><p>MQTT: ' + p.heartbeat.transportLayer.mqtt + '<br>WebSocket: ' + p.heartbeat.transportLayer.websocket + '</p>';
        el.innerHTML += '<h3>应用层</h3><p>' + p.heartbeat.applicationLayer.description + '</p>';
        if (p.heartbeat.applicationLayer.example) {
          el.innerHTML += '<pre class="code">' + JSON.stringify(p.heartbeat.applicationLayer.example, null, 2) + '</pre>';
        }
        if (p.heartbeat.reconnection) {
          var rc = p.heartbeat.reconnection;
          el.innerHTML += '<h3>断线重连</h3><p>初始延迟：' + rc.initialDelay + ' | 最大：' + rc.maxDelay + ' | 退避：' + rc.backoff + '</p>';
        }
      });
    }

    // 消息信封
    if (p.envelope && p.envelope.fields) {
      sec('消息信封', function (el) {
        el.innerHTML += '<p>格式：' + p.envelope.format.toUpperCase() + ' | 最大：' + (p.envelope.maxMessageSize || 'N/A') + '</p>';
        if (p.envelope.description) el.innerHTML += '<p style="font-size:.82rem;color:var(--text2)">' + p.envelope.description + '</p>';
        fieldTable(p.envelope.fields, el);
        if (p.envelope.deduplication) {
          el.innerHTML += '<h3>去重</h3><p>' + p.envelope.deduplication.mechanism + ' | 窗口：' + p.envelope.deduplication.window + '</p>';
          if (p.envelope.deduplication.algorithm) el.innerHTML += '<ol>' + p.envelope.deduplication.algorithm.map(function (s) { return '<li style="font-size:.80rem">' + s + '</li>'; }).join('') + '</ol>';
        }
      });
    }

    // Action 体系
    if (p.actionSystem) {
      sec('Action 动作体系', function (el) {
        el.innerHTML += '<p>' + p.actionSystem.description + '</p>';
        if (p.actionSystem.keyDistinctions) {
          el.innerHTML += '<h3>关键区分</h3>';
          Object.keys(p.actionSystem.keyDistinctions).forEach(function (k) {
            el.innerHTML += '<p style="font-size:.82rem"><strong>' + k.replace(/_/g, ' ') + '：</strong>' + p.actionSystem.keyDistinctions[k] + '</p>';
          });
        }
      });
    }

    // 状态码
    if (p.statusCodes) {
      sec('状态码', function (el) {
        el.innerHTML += '<p>位置：' + p.statusCodes.location + ' | 成功码：' + p.statusCodes.success + '</p>';
        if (p.statusCodes.categories) {
          Object.keys(p.statusCodes.categories).forEach(function (cat) {
            el.innerHTML += '<h3>' + cat.replace(/_/g, ' ') + '</h3>';
            var codes = p.statusCodes.categories[cat];
            tbl(['代码', '标识', '说明'], Object.keys(codes).map(function (k) {
              var c = codes[k]; return ['<code>' + c.code + '</code>', c.meaning, c.description];
            }), el);
          });
        }
      });
    }

    // RPC 语义（增强版）
    if (p.rpc) {
      sec('RPC 语义', function (el) {
        el.innerHTML += '<p><strong>模型：</strong>' + p.rpc.model + ' — ' + (p.rpc.description || p.rpc.correlation || '') + '</p>';
        if (p.rpc.concurrent) el.innerHTML += '<p><strong>并发：</strong>' + p.rpc.concurrent.default + '（' + p.rpc.concurrent.scope + '）</p>';

        if (p.rpc.idempotency) {
          el.innerHTML += '<h3>幂等性</h3><p>' + p.rpc.idempotency.mechanism + '</p>';
          if (p.rpc.idempotency.flow) el.innerHTML += '<ol>' + p.rpc.idempotency.flow.map(function (s) { return '<li style="font-size:.80rem">' + s + '</li>'; }).join('') + '</ol>';
        }

        if (p.rpc.retry && p.rpc.retry.strategies) {
          el.innerHTML += '<h3>重试策略</h3>';
          tbl(['策略', '适用场景', '最大重试', '退避', '说明'], p.rpc.retry.strategies.map(function (s) {
            return [badge(s.name, 'call'), s.appliesTo || s.title || '', typeof s.maxRetries === 'number' ? String(s.maxRetries) : s.maxRetries, s.backoff || '无', s.description || ''];
          }), el);
        }

        if (p.rpc.cancel) {
          el.innerHTML += '<h3>调用中断</h3>';
          if (p.rpc.cancel.mechanisms) {
            p.rpc.cancel.mechanisms.forEach(function (m) {
              el.innerHTML += '<p><code>' + m.action + '</code> (' + m.direction + ')：' + m.description + '</p>';
            });
          }
          if (p.rpc.cancel.flow) el.innerHTML += '<p style="font-size:.80rem">' + p.rpc.cancel.flow + '</p>';
        }
      });
    }

    // 字段规范
    if (p.fieldSpec) {
      sec('字段定义与编码', function (el) {
        if (p.fieldSpec.namingConvention) {
          el.innerHTML += '<h3>命名规范</h3>';
          Object.keys(p.fieldSpec.namingConvention).forEach(function (k) {
            el.innerHTML += '<p><strong>' + k + '：</strong>' + p.fieldSpec.namingConvention[k] + '</p>';
          });
        }
        if (p.fieldSpec.dataTypes) {
          el.innerHTML += '<h3>数据类型</h3>';
          tbl(['类型', '说明'], Object.keys(p.fieldSpec.dataTypes).map(function (k) { return ['<code>' + k + '</code>', p.fieldSpec.dataTypes[k]]; }), el);
        }
      });
    }

    // 流式传输（增强版）
    if (p.streaming) {
      sec('流式传输', function (el) {
        el.innerHTML += '<p><strong>模型：</strong>' + p.streaming.model + '</p>';
        if (p.streaming.description) el.innerHTML += '<p style="font-size:.82rem">' + p.streaming.description + '</p>';
        if (p.streaming.streamLifecycle) el.innerHTML += '<h3>生命周期</h3><ol>' + p.streaming.streamLifecycle.map(function (s) { return '<li style="font-size:.80rem">' + s + '</li>'; }).join('') + '</ol>';
        if (p.streaming.dataPlane && p.streaming.dataPlane.frameHeader) {
          el.innerHTML += '<h3>数据面帧头 ' + p.streaming.dataPlane.frameHeader.size + ' 字节</h3>';
          var fh = p.streaming.dataPlane.frameHeader.fields;
          tbl(['字段', '字节', '类型', '说明'], Object.keys(fh).map(function (k) { var f = fh[k]; return ['<code>' + k + '</code>', f.bytes || '', f.type || '', f.desc || '']; }), el);
        }
      });
    }

    // Action 总览表
    if (p.actions) {
      sec('Action 总览', function (el) {
        Object.keys(p.actions).forEach(function (cat) {
          el.innerHTML += '<h3>' + cat.replace(/_/g, ' ') + '</h3>';
          tbl(['Action', '方向', '类型', '重试', '超时', '说明'], p.actions[cat].map(function (a) {
            return ['<code>' + a.action + '</code>', a.direction, a.type, badge(a.retry, 'call'), a.timeout, a.desc];
          }), el);
        });
      });
    }

    // 文档历史
    if (p.documentHistory) {
      sec('文档历史', function (el) {
        tbl(['版本', '日期', '变更说明'], p.documentHistory.map(function (h) { return [h.version, h.date, h.changes]; }), el);
      });
    }

    // 关联文档
    if (p.relatedDocuments) {
      sec('关联文档', function (el) {
        el.innerHTML += '<ul>' + p.relatedDocuments.map(function (d) { return '<li>' + d + '</li>'; }).join('') + '</ul>';
      });
    }
  }

  // ═══════════════════════════════════════════
  // 领域端点渲染
  // ═══════════════════════════════════════════

  function renderDomain(d) {
    sec(d.name + ' — ' + (d.domain || ''), function (el) {
      el.innerHTML += '<p>' + (d.description || '') + '</p>';
      var stats = d.stats || {};
      if (stats.totalEndpoints) el.innerHTML += '<p>' + badge(stats.totalEndpoints + ' 端点', 'rest') + ' ' + badge(stats.zyricCount + ' ZYRIC', 'zyric') + ' ' + badge(stats.restCount + ' REST', 'rest') + '</p>';
    });

    if (!d.endpoints || d.endpoints.length === 0) {
      sec('端点', function (el) { el.innerHTML += '<p>暂无端点定义</p>'; });
      return;
    }

    d.endpoints.forEach(function (ep) {
      renderEndpoint(ep);
    });
  }

  function renderEndpoint(ep) {
    var isRest = ep.protocol === 'rest';
    var isZyric = ep.protocol === 'zyric-v1';

    var headerHtml = '';
    if (isRest) {
      var method = (ep.addressing && ep.addressing.method) || 'GET';
      var methodCls = method.toLowerCase();
      headerHtml = badge(method.toUpperCase(), methodCls) + ' <code>' + (ep.addressing ? ep.addressing.path : '') + '</code> ' + badge('REST', 'rest');
    } else if (isZyric) {
      headerHtml = badge('ZYRIC', 'zyric') + ' <strong>' + (ep.action || '') + '</strong> ' + badge(ep.type || 'call', ep.type === 'call' ? 'call' : 'ack') + ' ' + badge(ep.direction || '', 'mqtt');
    } else {
      headerHtml = badge(ep.protocol || '?', 'rest') + ' <strong>' + (ep.action || ep.id || '') + '</strong>';
    }

    var bodyHtml = '';
    if (ep.description) bodyHtml += '<p style="margin-bottom:8px">' + ep.description + '</p>';

    // 请求字段
    var reqFields = null;
    if (isRest && ep.request && ep.request.body) {
      reqFields = ep.request.body;
    } else if (isZyric && ep.envelope && ep.envelope.payload) {
      reqFields = ep.envelope.payload;
    } else if (ep.request && ep.request.fields) {
      reqFields = ep.request.fields;
    }

    if (reqFields && typeof reqFields === 'object' && Object.keys(reqFields).length > 0 && !reqFields.type) {
      bodyHtml += '<h4>请求</h4>';
      bodyHtml += '<div style="margin-left:8px">';
      Object.keys(reqFields).forEach(function (k) {
        var f = reqFields[k];
        if (f && typeof f === 'object' && f.type) {
          var req = f.required ? badge('必填', 'error') : badge('可选', 'success');
          bodyHtml += '<p style="font-size:.80rem;margin:2px 0"><code>' + k + '</code> ' + f.type + ' ' + req + (f.desc ? ' — ' + f.desc : '') + '</p>';
          if (f.fields) {
            bodyHtml += '<div style="margin-left:14px">';
            Object.keys(f.fields).forEach(function (sk) {
              var sf = f.fields[sk];
              bodyHtml += '<p style="font-size:.78rem;margin:1px 0;color:var(--text2)"><code>' + sk + '</code> ' + (sf.type || '') + (sf.desc ? ' — ' + sf.desc : '') + '</p>';
            });
            bodyHtml += '</div>';
          }
        }
      });
      bodyHtml += '</div>';
    }

    // 响应
    if (ep.response) {
      bodyHtml += '<h4>响应</h4>';
      if (isZyric) bodyHtml += '<p style="font-size:.80rem;color:var(--text2)">ACK action: <code>' + (ep.response.action || '') + '</code></p>';
      if (ep.response.fields && typeof ep.response.fields === 'object') {
        bodyHtml += '<div style="margin-left:8px">';
        Object.keys(ep.response.fields).forEach(function (k) {
          var f = ep.response.fields[k];
          bodyHtml += '<p style="font-size:.80rem;margin:2px 0"><code>' + k + '</code> ' + (f.type || '') + (f.desc ? ' — ' + f.desc : '') + '</p>';
        });
        bodyHtml += '</div>';
      }
    }

    // RPC 配置
    if (ep.rpc && (ep.rpc.timeout || ep.rpc.retry)) {
      bodyHtml += '<h4>RPC</h4>';
      if (ep.rpc.timeout) bodyHtml += '<p style="font-size:.80rem">超时: ' + ep.rpc.timeout + '</p>';
      if (ep.rpc.retry) bodyHtml += '<p style="font-size:.80rem">重试: ' + ep.rpc.retry + '</p>';
    }

    // 错误
    if (ep.errors && ep.errors.length) {
      bodyHtml += '<h4>错误</h4>';
      ep.errors.forEach(function (err) {
        var code = err.status ? 'HTTP ' + err.status : err.code ? 'code ' + err.code : '';
        bodyHtml += '<p style="font-size:.78rem;color:var(--red)">' + code + ': ' + (err.body ? JSON.stringify(err.body) : err.meaning || '') + '</p>';
      });
    }

    var card = document.createElement('div'); card.className = 'endpoint-card';
    card.innerHTML = '<div class="ep-header">' + headerHtml + '</div><div class="ep-body">' + bodyHtml + '</div>';
    content.appendChild(card);
  }

  // ── 启动 ──
  var allFiles = files.concat(dataFiles);
  loadScripts(allFiles, function () { waitForData(); });
})();
</script>
</body>
</html>
