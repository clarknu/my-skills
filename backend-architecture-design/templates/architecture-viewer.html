<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backend Architecture — 智能床云端系统</title>
<style>
  :root {
    --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --text2: #64748b;
    --border: #e2e8f0; --radius: 10px; --shadow: 0 1px 3px rgba(0,0,0,.08);
    --blue: #2563eb; --purple: #7c3aed; --amber: #d97706; --green: #10b981; --red: #ef4444;
    --info-bg: #eff6ff; --info-border: #bfdbfe; --info-text: #1e40af;
    --warn-bg: #fffbeb; --warn-border: #fde68a; --warn-text: #92400e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.55; font-size: .9rem; }

  .toolbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow); }
  .toolbar .title { font-weight: 700; font-size: .95rem; }
  .toolbar .stats { font-size: .78rem; color: var(--text2); margin-left: auto; }

  .layout { display: flex; height: calc(100vh - 46px); }
  #sidebar { width: 240px; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0; flex-shrink: 0; }
  #sidebar h3 { font-size: .72rem; text-transform: uppercase; color: var(--text2); padding: 0 14px; margin: 12px 0 4px; letter-spacing: .05em; cursor: default; }
  #sidebar h3:first-child { margin-top: 0; }
  #sidebar nav a { display: block; padding: 5px 14px; font-size: .82rem; color: var(--text); text-decoration: none; border-left: 3px solid transparent; transition: all .15s; cursor: pointer; user-select: none; }
  #sidebar nav a:hover { background: #f8fafc; color: var(--blue); }
  #sidebar nav a.active { border-left-color: var(--blue); color: var(--blue); background: #eff6ff; font-weight: 600; }

  #content { flex: 1; overflow-y: auto; padding: 20px 28px; }

  .section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .section h1 { font-size: 1.3rem; margin-bottom: 8px; }
  .section h2 { font-size: 1.1rem; margin: 16px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .section h3 { font-size: .95rem; margin: 14px 0 6px; }
  .section h4 { font-size: .85rem; margin: 10px 0 4px; color: var(--text2); }
  .section p { margin-bottom: 6px; }
  .section ul, .section ol { margin: 4px 0 8px 18px; }
  .section li { margin-bottom: 2px; }

  .note { padding: 10px 14px; border-radius: 6px; margin: 10px 0; font-size: .84rem; border-left: 3px solid; }
  .note.info { background: var(--info-bg); border-color: var(--info-border); color: var(--info-text); }
  .note.warning { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn-text); }
  .note.info::before { content: "ℹ 信息"; font-weight: 700; display: block; margin-bottom: 2px; font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; }
  .note.warning::before { content: "⚠ 注意"; font-weight: 700; display: block; margin-bottom: 2px; font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; }

  table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: .84rem; }
  th { background: #f8fafc; color: var(--text2); font-size: .72rem; text-transform: uppercase; letter-spacing: .03em; padding: 8px 12px; text-align: left; border-bottom: 2px solid var(--border); }
  td { padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:hover td { background: #fafbfc; }

  .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: .75rem; font-weight: 600; }
  .badge.l3 { background: #fef3c7; color: #92400e; }
  .badge.event { background: #ede9fe; color: #6d28d9; }
  .badge.command { background: #fce7f3; color: #be185d; }
  .badge.module { background: #dbeafe; color: #1e40af; }
  .badge.yes { background: #d1fae5; color: #065f46; }
  .badge.no { background: #fee2e2; color: #991b1b; }

  .event-card { border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; margin: 6px 0; font-size: .83rem; }
  .event-card h4 { margin: 0 0 4px; color: var(--purple); }
  .event-card .meta { font-size: .76rem; color: var(--text2); }

  .dep-item { background: #f8fafc; border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; font-size: .80rem; margin: 3px 0; }
  .dep-item .arrow { color: var(--blue); margin: 0 4px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state h2 { font-size: 1.1rem; margin-bottom: 6px; }

  pre.code { font-size:.78rem; background:#f8fafc; padding:12px; border-radius:6px; overflow-x:auto; border:1px solid var(--border); }
</style>
</head>
<body>

<div class="toolbar">
  <span class="title">🏗️ Backend Architecture — 智能床云端系统</span>
  <span class="stats" id="toolbarStats">加载中…</span>
</div>

<div class="layout">
  <div id="sidebar">
    <h3>概览</h3>
    <nav>
      <a data-view="topology">系统拓扑</a>
      <a data-view="complexity">复杂度判定</a>
    </nav>
    <h3>模块边界</h3>
    <nav id="navModules"></nav>
    <h3>事件系统</h3>
    <nav>
      <a data-view="events">事件契约总览</a>
    </nav>
    <h3>横切关注点</h3>
    <nav>
      <a data-view="layering">分层策略</a>
      <a data-view="caching">缓存策略</a>
      <a data-view="resilience">可靠性策略</a>
      <a data-view="consistency">数据一致性</a>
      <a data-view="observability">可观测性</a>
      <a data-view="security">安全策略</a>
    </nav>
  </div>

  <div id="content">
    <div class="empty-state" id="loading"><h2>⏳ 加载中…</h2><p>正在读取架构数据文件</p></div>
  </div>
</div>

<script src="data/loader.js"></script>
<script>
// ── 全局架构查看器（必须在全局作用域）──
(function () {
  var content = document.getElementById('content');
  var loading = document.getElementById('loading');
  var toolbarStats = document.getElementById('toolbarStats');
  var ARCH = window.ARCH_DATA || {};

  // ── 等待数据就绪 ──
  function waitForData(retries) {
    retries = retries || 0;
    var topo = ARCH['system-topology'];
    var mb = ARCH['module-boundaries'];
    if (topo && mb) {
      loading.style.display = 'none';
      toolbarStats.textContent = 'L' + topo.complexityLevel + ' | ' + topo.domainCount + ' 域 | ' + topo.totalEntities + ' 实体';
      buildModuleNav();
      showView('topology');
      return;
    }
    if (retries > 100) { loading.innerHTML = '<h2>❌ 加载失败</h2><p>请检查 data/ 目录下文件是否存在，或查看浏览器控制台</p>'; return; }
    setTimeout(function () { waitForData(retries + 1); }, 100);
  }

  // ── 导航构建 ──
  function buildModuleNav() {
    var mb = ARCH['module-boundaries'];
    if (!mb) return;
    var nav = document.getElementById('navModules');
    Object.keys(mb.modules).forEach(function (slug) {
      var m = mb.modules[slug];
      var a = document.createElement('a');
      a.textContent = m.name;
      a.setAttribute('data-module', slug);
      nav.appendChild(a);
    });
  }

  // ── 点击事件（委托到 sidebar）──
  document.getElementById('sidebar').addEventListener('click', function (e) {
    var a = e.target.closest('a');
    if (!a) return;
    var view = a.getAttribute('data-view');
    var mod = a.getAttribute('data-module');
    if (view) { showView(view); return; }
    if (mod) { showModule(mod); return; }
  });

  // ── 视图切换 ──
  function showView(id) {
    setActiveNav('[data-view="' + id + '"]');
    content.innerHTML = '';
    try {
      var fn = renderers[id];
      if (fn) { fn(); } else { content.innerHTML = '<div class="section"><h1>未找到视图</h1><p>视图 "' + id + '" 的渲染函数未定义</p></div>'; }
    } catch (e) {
      content.innerHTML = '<div class="section"><h1>渲染错误</h1><p>' + e.message + '</p><pre class="code">' + (e.stack || '') + '</pre></div>';
      console.error(e);
    }
  }

  function showModule(slug) {
    setActiveNav('[data-module="' + slug + '"]');
    content.innerHTML = '';
    try {
      renderModule(slug);
    } catch (e) {
      content.innerHTML = '<div class="section"><h1>渲染错误</h1><p>' + e.message + '</p></div>';
      console.error(e);
    }
  }

  function setActiveNav(selector) {
    document.querySelectorAll('#sidebar nav a').forEach(function (a) { a.classList.remove('active'); });
    var el = document.querySelector('#sidebar ' + selector);
    if (el) el.classList.add('active');
  }

  // ── 渲染辅助 ──
  function sec(title, bodyFn) {
    var div = document.createElement('div'); div.className = 'section';
    var h1 = document.createElement('h1'); h1.textContent = title; div.appendChild(h1);
    if (bodyFn) bodyFn(div);
    content.appendChild(div);
    return div;
  }

  function tbl(headers, rows, parent) {
    var t = document.createElement('table');
    var thead = document.createElement('thead');
    var tr = document.createElement('tr');
    headers.forEach(function (h) { var th = document.createElement('th'); th.textContent = h; tr.appendChild(th); });
    thead.appendChild(tr); t.appendChild(thead);
    var tbody = document.createElement('tbody');
    rows.forEach(function (row) {
      var r = document.createElement('tr');
      row.forEach(function (cell) { var td = document.createElement('td'); td.innerHTML = cell; r.appendChild(td); });
      tbody.appendChild(r);
    });
    t.appendChild(tbody);
    (parent || content.lastChild).appendChild(t);
  }

  function badge(text, cls) { return '<span class="badge ' + cls + '">' + text + '</span>'; }

  function noteEl(type, text) {
    var div = document.createElement('div'); div.className = 'note ' + type; div.textContent = text;
    return div;
  }

  // ═══════════════════════════════════════════
  // 渲染器
  // ═══════════════════════════════════════════

  var renderers = {

    topology: function () {
      var d = ARCH['system-topology']; if (!d) { sec('系统拓扑', function (el) { el.innerHTML = '<p>数据未加载</p>'; }); return; }
      var s = d.architectureStyle;
      sec('系统拓扑 — ' + d.complexityLevel + ' 事件驱动模块化单体', function (el) {
        el.innerHTML += '<p><strong>复杂度判定依据：</strong>' + d.complexityRationale + '</p>';
        el.innerHTML += '<h2>架构模式</h2>';
        el.innerHTML += '<p><strong>' + (s.primary || s) + '</strong></p>';
        if (s.rationale) { el.innerHTML += '<ul>' + s.rationale.map(function (r) { return '<li>' + r + '</li>'; }).join('') + '</ul>'; }
        if (s.eventArchitecture) {
          var ea = s.eventArchitecture;
          el.innerHTML += '<h3>事件架构</h3>';
          el.innerHTML += '<p><strong>总线：</strong>' + ea.bus + ' | <strong>存储：</strong>' + ea.store + '</p>';
          el.innerHTML += '<h4>事件分层</h4>';
          Object.keys(ea.layers).forEach(function (k) {
            var l = ea.layers[k];
            el.innerHTML += '<div class="event-card"><h4>' + l.type + '</h4><div class="meta">方向: ' + l.direction + ' | 生产者: ' + l.producer + ' | 消费者: ' + l.consumer + '</div></div>';
          });
          if (ea.identifier) {
            el.innerHTML += '<h4>EventIdentifier</h4><ul>' + ea.identifier.capabilities.map(function (c) { return '<li>' + c + '</li>'; }).join('') + '</ul>';
          }
        }
        el.innerHTML += '<h2>技术栈</h2>';
        Object.keys(d.techStack).forEach(function (k) { el.innerHTML += '<p><strong>' + k + '：</strong>' + d.techStack[k] + '</p>'; });
      });
    },

    complexity: function () {
      var d = ARCH['system-topology']; if (!d) { sec('复杂度判定', function (el) { el.innerHTML = '<p>数据未加载</p>'; }); return; }
      var q = d.complexityQuestionnaire;
      sec('复杂度判定 — ' + d.complexityLevel, function (el) {
        el.innerHTML += '<p>' + d.complexityRationale + '</p>';
        var rows = [];
        Object.keys(q).forEach(function (k) {
          var item = q[k];
          rows.push([k.replace(/_/g, ' '), item.answer === 'yes' ? badge('是', 'yes') : badge('否', 'no'), item.value, item.note || '']);
        });
        tbl(['问题', '触发', '值', '备注'], rows, el);
      });
    },

    events: function () {
      var d = ARCH['event-contracts']; if (!d) { sec('事件契约', function (el) { el.innerHTML = '<p>数据未加载</p>'; }); return; }
      var reg = d.eventRegistry;
      sec('事件契约总览（' + d.totalDomainEvents + ' Domain Events + ' + d.totalCommands + ' Commands）', function (el) {
        el.innerHTML += '<h2>Domain Events</h2>';
        Object.keys(reg.DomainEvents).forEach(function (name) {
          var e = reg.DomainEvents[name];
          var producerMod = (e.producer || '').split('/')[0];
          var fields = typeof e.fields === 'string' ? e.fields : Object.keys(e.fields || {}).join(', ');
          el.innerHTML += '<div class="event-card"><h4>' + name + ' ' + badge(producerMod, 'module') + '</h4><div class="meta">生产者: ' + e.producer + ' | 消费者: ' + (e.consumers || []).join(', ') + '</div><div class="meta">字段: ' + fields + '</div></div>';
        });
        el.innerHTML += '<h2>Commands</h2>';
        Object.keys(reg.Commands).forEach(function (name) {
          var e = reg.Commands[name];
          var fields = typeof e.fields === 'string' ? e.fields : Object.keys(e.fields || {}).join(', ');
          el.innerHTML += '<div class="event-card"><h4>' + name + ' ' + badge('CMD', 'command') + '</h4><div class="meta">生产者: ' + e.producer + ' | 消费者: ' + e.consumer + '</div><div class="meta">字段: ' + fields + '</div></div>';
        });
      });
    },

    layering: function () {
      var d = ARCH['layering-strategy']; if (!d) { sec('分层策略', function (el) { el.innerHTML = '<p>数据未加载</p>'; }); return; }
      sec('分层策略', function (el) {
        d.layers.forEach(function (l) {
          el.innerHTML += '<h3>' + l.name + ' <span style="font-size:.78rem;color:var(--blue)">' + (l.path || '') + '</span></h3>';
          el.innerHTML += '<p><strong>职责：</strong>' + l.responsibility + '</p>';
          el.innerHTML += '<p><strong>依赖：</strong>' + (l.dependsOn || []).join(' → ') + '</p>';
          if (l.forbiddenDeps && l.forbiddenDeps.length) { el.innerHTML += '<p><strong>禁止依赖：</strong>' + l.forbiddenDeps.join(', ') + '</p>'; }
          if (l.codePattern) el.innerHTML += '<p style="font-size:.80rem;color:var(--text2)"><code>' + l.codePattern + '</code></p>';
        });
        if (d.directoryTemplate) {
          el.innerHTML += '<h2>目录结构</h2><pre class="code">' + JSON.stringify(d.directoryTemplate, null, 2) + '</pre>';
        }
      });
    },

    caching: function () {
      var d = ARCH['caching-strategy']; if (!d) { sec('缓存策略', function (el) { el.innerHTML = '<p>数据未加载</p>'; }); return; }
      sec('缓存策略', function (el) {
        el.innerHTML += '<p><strong>开发：</strong>' + (d.cacheBackend ? d.cacheBackend.development : 'N/A') + '</p>';
        el.innerHTML += '<p><strong>生产：</strong>' + (d.cacheBackend ? d.cacheBackend.production : 'N/A') + '</p>';
        if (d.policies) {
          tbl(['资源', '层级', 'TTL', '策略', '失效'], d.policies.map(function (p) { return [p.resource, p.layer, p.ttl, p.strategy, p.invalidation || '']; }), el);
        }
        if (d.antiPatterns) {
          el.innerHTML += '<h2>防护</h2>';
          Object.keys(d.antiPatterns).forEach(function (k) { el.innerHTML += '<p><strong>' + k + '：</strong>' + d.antiPatterns[k] + '</p>'; });
        }
      });
    },

    resilience: function () {
      var d = ARCH['resilience-policy']; if (!d) { sec('可靠性策略', function (el) { el.innerHTML = '<p>数据未加载</p>'; }); return; }
      sec('可靠性策略', function (el) {
        el.innerHTML += '<h2>超时</h2>';
        Object.keys(d.timeout || {}).forEach(function (k) { el.innerHTML += '<p><strong>' + k + '：</strong>' + d.timeout[k] + '</p>'; });
        el.innerHTML += '<h2>重试</h2><p>' + (d.retry ? d.retry.strategy + ' | 最多 ' + d.retry.externalMaxAttempts + ' 次' : 'N/A') + '</p>';
        if (d.circuitBreaker && d.circuitBreaker.targets) {
          el.innerHTML += '<h2>熔断</h2>';
          tbl(['服务', '阈值', '恢复', '降级'], d.circuitBreaker.targets.map(function (t) { return [t.service, t.threshold, t.recoveryTime, (d.circuitBreaker.fallback||{})[t.service]||'']; }), el);
        }
        el.innerHTML += '<h2>幂等</h2><p>' + (d.idempotency ? d.idempotency.requiredEndpoints.join(', ') : 'N/A') + '</p>';
        el.innerHTML += '<h2>频控</h2>';
        Object.keys(d.rateLimit || {}).forEach(function (k) { el.innerHTML += '<p><strong>' + k + '：</strong>' + d.rateLimit[k] + '</p>'; });
        if (d.eventBus) { el.innerHTML += '<h2>EventBus</h2><p>Handler 失败隔离 | 超时 60s | 3 次失败毒丸 | EventStore 重放</p>'; }
      });
    },

    consistency: function () {
      var d = ARCH['data-consistency']; if (!d) { sec('数据一致性', function (el) { el.innerHTML = '<p>数据未加载</p>'; }); return; }
      sec('数据一致性', function (el) {
        if (d.strategy) {
          el.innerHTML += '<p><strong>模块内：</strong>' + d.strategy.primary + '</p>';
          el.innerHTML += '<p><strong>跨模块：</strong>' + d.strategy.crossModule + '</p>';
          el.innerHTML += '<p><strong>长时间：</strong>' + d.strategy.longRunning + '</p>';
        }
        if (d.outbox) {
          el.innerHTML += '<h2>Outbox</h2><p>存储: ' + d.outbox.storage + ' | 发布: ' + (d.outbox.publisher ? d.outbox.publisher.type : '') + ' | 保障: ' + d.outbox.guarantee + '</p>';
        }
        if (d.transactionBoundaries) {
          el.innerHTML += '<h2>事务边界</h2>';
          d.transactionBoundaries.forEach(function (tb) {
            el.innerHTML += '<h4>' + tb.scenario + ' (' + tb.strategy + ')</h4><ol>' + tb.steps.map(function (s) { return '<li>' + s + '</li>'; }).join('') + '</ol>';
            if (tb.note) el.innerHTML += '<p style="font-size:.82rem;color:var(--text2)">' + tb.note + '</p>';
          });
        }
      });
    },

    observability: function () {
      var d = ARCH['observability-policy']; if (!d) { sec('可观测性', function (el) { el.innerHTML = '<p>数据未加载</p>'; }); return; }
      sec('可观测性', function (el) {
        el.innerHTML += '<h2>日志</h2><p>' + (d.logging ? d.logging.library + ' | 关联ID: ' + d.logging.correlationId.header : 'N/A') + '</p>';
        el.innerHTML += '<h2>指标</h2><p>端点: ' + (d.metrics ? d.metrics.endpoint : '') + '</p>';
        if (d.metrics && d.metrics.custom) { el.innerHTML += '<p>自定义: ' + d.metrics.custom.join(', ') + '</p>'; }
        el.innerHTML += '<h2>健康检查</h2><p>' + (d.healthCheck ? d.healthCheck.endpoint + ' | ' + d.healthCheck.readinessProbe : 'N/A') + '</p>';
        if (d.auditLog) { el.innerHTML += '<h2>审计</h2><p>保留: ' + d.auditLog.retention + '</p>'; }
        if (d.alerting && d.alerting.rules) {
          el.innerHTML += '<h2>告警</h2>';
          tbl(['规则', '条件', '严重度'], d.alerting.rules.map(function (r) { return [r.name, r.condition, r.severity]; }), el);
        }
      });
    },

    security: function () {
      var d = ARCH['security-policy']; if (!d) { sec('安全策略', function (el) { el.innerHTML = '<p>数据未加载</p>'; }); return; }
      sec('安全策略', function (el) {
        el.innerHTML += '<h2>认证</h2><h3>Web Admin</h3><p>' + (d.auth ? d.auth.webAdmin.scheme + ' | ' + d.auth.webAdmin.tokenLifetime : 'N/A') + '</p>';
        el.innerHTML += '<h3>设备</h3><p>' + (d.auth ? d.auth.device.scheme : 'N/A') + '</p>';
        el.innerHTML += '<h2>授权</h2><p>' + (d.authorization ? d.authorization.model : 'N/A') + '</p>';
        el.innerHTML += '<h2>敏感数据</h2><p>' + (d.sensitiveData ? d.sensitiveData.encryption.algorithm : 'N/A') + '</p>';
        el.innerHTML += '<h2>设备安全</h2><p>MQTT: ' + (d.deviceSecurity ? d.deviceSecurity.mqtt.tls : 'N/A') + '</p>';
      });
    }
  };

  // ── 模块详情渲染 ──
  function renderModule(slug) {
    var mb = ARCH['module-boundaries']; if (!mb) { sec('错误', function (el) { el.innerHTML = '<p>模块边界数据未加载</p>'; }); return; }
    var m = mb.modules[slug];
    if (!m) { sec('模块未找到', function (el) { el.innerHTML = '<p>slug: ' + slug + '</p>'; }); return; }

    sec(m.name + ' — ' + slug, function (el) {
      el.innerHTML += '<p>' + (m.description || '') + '</p>';
      if (m.note) el.appendChild(noteEl('info', m.note));
      if (m.ownsEntities) { el.innerHTML += '<h2>拥有实体</h2><p>' + m.ownsEntities.join(', ') + '</p>'; }
      if (m.applicationService) {
        el.innerHTML += '<h2>Application Service 接口</h2>';
        Object.keys(m.applicationService).forEach(function (iface) {
          el.innerHTML += '<h3>' + iface + '</h3><ul>' + m.applicationService[iface].methods.map(function (mtd) { return '<li><code>' + mtd + '</code></li>'; }).join('') + '</ul>';
        });
      }
      if (m.events) {
        if (m.events.publishes && m.events.publishes.length) {
          el.innerHTML += '<h2>发布事件（' + m.events.publishes.length + '）</h2>';
          m.events.publishes.forEach(function (e) {
            el.innerHTML += '<div class="event-card"><h4>' + e.event + ' ' + badge('发布', 'event') + '</h4><div class="meta">' + e.fields + '</div><div class="meta">' + e.desc + '</div></div>';
          });
        }
        if (m.events.subscribes && m.events.subscribes.length) {
          el.innerHTML += '<h2>订阅事件（' + m.events.subscribes.length + '）</h2>';
          m.events.subscribes.forEach(function (e) {
            el.innerHTML += '<div class="event-card"><h4>' + e.event + ' → ' + e.handler + '() ' + badge('订阅', 'command') + '</h4><div class="meta">' + e.desc + '</div></div>';
          });
        }
      }
      if (m.crossModuleCalls && m.crossModuleCalls.length) {
        el.innerHTML += '<h2>跨模块调用</h2>';
        tbl(['目标', '接口', '方法', '原因'], m.crossModuleCalls.map(function (c) { return [c.target, c.via, c.methods.join(', '), c.reason]; }), el);
      }
      el.innerHTML += '<p style="margin-top:10px;font-size:.80rem;color:var(--text2)">数据库: ' + m.databaseOwnership + ' | 可独立部署: ' + (m.independentDeployable ? '是' : '否') + '</p>';
    });
  }

  // ── 启动 ──
  waitForData();
})();
</script>
</body>
</html>
